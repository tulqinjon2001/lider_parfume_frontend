<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Lider Parfum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-box">
      <div class="login-brand">Lider Parfum</div>
      <h1>Admin panel</h1>
      <p class="login-sub">Mahsulotlarni boshqarish uchun kiring</p>
      <input type="password" id="password" placeholder="Parol" required autofocus>
      <button type="submit" class="btn-primary btn-block">Kirish</button>
      <p class="login-error" id="loginError"></p>
    </form>
  </div>

  <div id="adminApp" class="admin-app hidden">
    <header class="admin-header">
      <nav class="admin-tabs">
        <a href="/admin" class="admin-tab is-active" aria-current="page">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6h16v4H4V6zm0 8h16v4H4v-4z" />
          </svg>
          Mahsulotlar
        </a>
        <a href="/admin/catalog" class="admin-tab">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 5h18v2H3V5zm4 4h10v2H7V9zm-4 8h18v2H3v-2zm8-4h10v2H11v-2z" />
          </svg>
          Brand va Kategoriya
        </a>
      </nav>

      <div class="admin-header-center">
        <button type="button" id="addProductBtn" class="btn-add" aria-label="Mahsulot qo'shish" title="Mahsulot qo'shish">
          +
        </button>
      </div>

      <div class="header-actions">
        <button type="button" id="logoutBtn" class="btn-ghost btn-logout">Chiqish</button>
      </div>
    </header>

    <main class="admin-main">
      <div id="productsOverview" class="products-overview"></div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/admin.js"></script>
</body>
</html>

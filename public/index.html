<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lider Parfum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Lider Parfum</h1>
    <button class="cart-btn" id="cartBtn" aria-label="Savat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </header>

  <main>
    <div class="filters" id="filters"></div>
    <div class="products" id="products"></div>
  </main>

  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Savat</h2>
      <button class="close-btn" id="closeCart">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Jami</span>
        <span id="cartTotal">0 so'm</span>
      </div>
      <form id="orderForm">
        <input type="text" id="customerName" placeholder="Ism" required>
        <input type="tel" id="customerPhone" placeholder="Telefon" required>
        <button type="submit" class="order-btn">Zakaz berish</button>
      </form>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <div class="product-modal" id="productModal" aria-hidden="true">
    <div class="product-modal-dialog">
      <button class="product-modal-close" id="closeProductModal" type="button" aria-label="Yopish">&times;</button>
      <div class="product-modal-body">
        <div class="product-modal-left">
          <div class="product-modal-preview">
            <img id="modalPreview" src="" alt="">
          </div>
          <p class="picker-label">Hidni rasmdan tanlang:</p>
          <div class="scent-grid" id="scentGrid"></div>
        </div>
        <div class="product-modal-right">
          <p class="product-modal-brand" id="modalBrand"></p>
          <h2 class="product-modal-title" id="modalTitle"></h2>
          <div class="product-modal-price">
            <span id="modalPrice"></span>
          </div>
          <p class="picker-label">Hajmni tanlang:</p>
          <div class="size-options" id="sizeOptions"></div>
          <div class="picker-summary" id="pickerSummary"></div>
          <div class="picker-qty">
            <button type="button" class="qty-btn" id="modalMinus">−</button>
            <span class="qty-value" id="modalQty">1</span>
            <button type="button" class="qty-btn" id="modalPlus">+</button>
          </div>
          <button type="button" class="add-btn modal-add-btn" id="modalAddBtn">Savatga qo'shish</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>

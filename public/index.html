<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f9fafb">
  <title>Lider Parfum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-top">
    <header class="site-header">
      <div class="container header-inner">
        <h1>Lider Parfum</h1>
        <button class="cart-btn" id="cartBtn" aria-label="Savat">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </header>

    <div class="container toolbar-wrap">
      <div class="toolbar" id="filters"></div>
    </div>
  </div>

  <main class="container">
    <div class="products" id="products"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2023 Lider Parfum. Barcha huquqlar himoyalangan.</p>
    </div>
  </footer>

  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Savat</h2>
      <button class="close-btn" id="closeCart">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Jami</span>
        <span id="cartTotal">0 so'm</span>
      </div>
      <form id="orderForm">
        <input type="text" id="customerName" placeholder="Ism" required>
        <input
          type="tel"
          id="customerPhone"
          placeholder="+998 90 123 45 67"
          inputmode="numeric"
          autocomplete="tel"
          required
        >
        <div class="form-field">
          <span class="form-label">To'lov turi</span>
          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="paymentType" value="naqd" checked required>
              <span>Naqd</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="paymentType" value="terminal" required>
              <span>Terminal</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="paymentType" value="transfer" required>
              <span>Kartaga o'tkazma</span>
            </label>
          </div>
        </div>
        <div class="form-field">
          <span class="form-label">Lokatsiya</span>
          <input type="hidden" id="customerLocation" required>
          <div class="location-box">
            <p class="location-status" id="locationStatus">Savat ochilganda avtomatik aniqlanadi</p>
            <button type="button" class="location-btn" id="detectLocationBtn">Lokatsiyani aniqlash</button>
          </div>
        </div>
        <textarea id="customerNote" placeholder="Izoh" rows="2"></textarea>
        <button type="submit" class="order-btn">Zakaz berish</button>
      </form>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <div class="product-modal" id="productModal" aria-hidden="true">
    <div class="product-modal-dialog">
      <button class="product-modal-close" id="closeProductModal" type="button" aria-label="Yopish">&times;</button>
      <div class="product-modal-sheet-handle" aria-hidden="true"></div>
      <div class="product-modal-body">
        <div class="product-modal-left">
          <div class="product-modal-preview">
            <img id="modalPreview" src="" alt="">
          </div>
          <p class="picker-label">Hidi rasmdan tanlang:</p>
          <div class="scent-grid" id="scentGrid"></div>
        </div>
        <div class="product-modal-right">
          <p class="product-modal-brand" id="modalBrand"></p>
          <h2 class="product-modal-title" id="modalTitle"></h2>
          <div class="product-modal-price" id="modalPrice"></div>
          <p class="picker-label">Hajmni tanlang:</p>
          <div class="size-options" id="sizeOptions"></div>
          <div class="picker-summary" id="pickerSummary"></div>
          <div class="modal-accordion">
            <button type="button" class="modal-accordion-toggle" id="modalDescToggle" aria-expanded="false">
              <span>MAHSULOT TAVSIFI</span>
              <svg class="accordion-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </button>
            <div class="modal-accordion-body" id="modalDescription" hidden></div>
          </div>
        </div>
      </div>
      <div class="product-modal-footer">
        <div class="picker-actions">
          <div class="picker-qty">
            <button type="button" class="qty-btn" id="modalMinus" aria-label="Kamaytirish">−</button>
            <input type="text" inputmode="numeric" class="qty-input" id="modalQty" value="1" aria-label="Miqdor">
            <button type="button" class="qty-btn" id="modalPlus" aria-label="Ko'paytirish">+</button>
          </div>
          <button type="button" class="modal-add-btn" id="modalAddBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            Savatga qo'shish
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>

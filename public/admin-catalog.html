<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brend va Kategoriya — Lider Parfum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-box">
      <div class="login-brand">Lider Parfum</div>
      <h1>Admin panel</h1>
      <p class="login-sub">Mahsulotlarni boshqarish uchun kiring</p>
      <input type="password" id="password" placeholder="Parol" required autofocus>
      <button type="submit" class="btn-primary btn-block">Kirish</button>
      <p class="login-error" id="loginError"></p>
    </form>
  </div>

  <div id="catalogApp" class="admin-app hidden">
    <header class="admin-header">
      <div class="admin-header-left">
        <a href="/" class="admin-logo">Lider Parfum</a>
        <nav class="admin-nav">
          <a href="/admin" class="admin-nav-link">Mahsulotlar</a>
          <a href="/admin/catalog" class="admin-nav-link is-active">Brend & Kategoriya</a>
        </nav>
      </div>
      <div class="header-actions">
        <button type="button" id="saveBtn" class="btn-save">Saqlash</button>
        <button type="button" id="logoutBtn" class="btn-ghost">Chiqish</button>
      </div>
    </header>

    <main class="admin-main">
      <div class="page-head">
        <h1 class="page-title">Brend va Kategoriya</h1>
        <p class="page-desc">Mahsulotlar uchun brend va kategoriya ro'yxatini boshqaring</p>
      </div>
      <div class="catalog-page-grid" id="catalogContent"></div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/admin-catalog.js"></script>
</body>
</html>

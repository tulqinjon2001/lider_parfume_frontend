<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Admin — Lider Parfum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-box">
      <div class="login-brand">Lider Parfum</div>
      <h1>Admin panel</h1>
      <p class="login-sub">Mahsulotlarni boshqarish uchun kiring</p>
      <input type="password" id="password" placeholder="Parol" required autofocus>
      <button type="submit" class="btn-primary btn-block">Kirish</button>
      <p class="login-error" id="loginError"></p>
    </form>
  </div>

  <div id="catalogApp" class="admin-app hidden">
    <header class="admin-header">
      <nav class="admin-tabs">
        <a href="/admin" class="admin-tab">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v4H4V6zm0 8h16v4H4v-4z"/></svg>
          <span class="admin-tab-label">Mahsulotlar</span>
        </a>
        <a href="/admin/catalog" class="admin-tab is-active" aria-current="page">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18v2H3V5zm4 4h10v2H7V9zm-4 8h18v2H3v-2zm8-4h10v2H11v-2z"/></svg>
          <span class="admin-tab-label">Brand va Kategoriya</span>
        </a>
        <a href="/admin/orders" class="admin-tab">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10l2 4H5l2-4zm-2 6h14l-1 10H6L5 10zm4 2v6h2v-6h-2zm4 0v6h2v-6h-2z"/></svg>
          <span class="admin-tab-label">Buyurtmalar</span>
        </a>
      </nav>

      <div class="admin-header-search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>
        </svg>
        <input type="search" id="catalogSearch" class="admin-search-input" placeholder="Brend yoki kategoriya qidirish..." autocomplete="off">
      </div>

      <div class="admin-header-actions">
        <button type="button" id="logoutBtn" class="btn-ghost btn-logout">Chiqish</button>
      </div>
    </header>

    <main class="admin-main">
      <div class="page-head">
        <h1 class="page-title" id="pageTitle">Brend va Kategoriya</h1>
        <p class="page-desc" id="pageDesc">Mahsulotlar uchun brend va kategoriya ro'yxatini boshqaring</p>
      </div>
      <div class="catalog-page-grid" id="catalogContent"></div>
    </main>
  </div>

  <div id="addModal" class="modal-overlay hidden">
    <div class="modal-dialog catalog-add-modal">
      <div class="modal-header">
        <h2 id="addModalTitle">Yangi qiymat</h2>
        <button type="button" class="modal-close" data-action="close-add-modal">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="addModalInput" class="catalog-add-input" placeholder="">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-ghost" data-action="close-add-modal">Bekor qilish</button>
        <button type="button" class="btn-primary" id="addModalSaveBtn">Saqlash</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/config.js"></script>
  <script src="/api.js"></script>
  <script src="/loader.js"></script>
  <script src="/admin-nav.js"></script>
  <script src="/admin-catalog.js"></script>
</body>
</html>

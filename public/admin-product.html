<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Mahsulot — Lider Parfum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-box">
      <div class="login-brand">Lider Parfum</div>
      <h1>Admin panel</h1>
      <p class="login-sub">Mahsulotlarni boshqarish uchun kiring</p>
      <input type="password" id="password" placeholder="Parol" required autofocus>
      <button type="submit" class="btn-primary btn-block">Kirish</button>
      <p class="login-error" id="loginError"></p>
    </form>
  </div>

  <div id="adminApp" class="admin-app hidden">
    <header class="admin-header">
      <nav class="admin-tabs">
        <a href="/admin" class="admin-tab">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v4H4V6zm0 8h16v4H4v-4z"/></svg>
          <span class="admin-tab-label">Mahsulotlar</span>
        </a>
        <a href="/admin/catalog" class="admin-tab">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18v2H3V5zm4 4h10v2H7V9zm-4 8h18v2H3v-2zm8-4h10v2H11v-2z"/></svg>
          <span class="admin-tab-label">Brand va Kategoriya</span>
        </a>
        <a href="/admin/orders" class="admin-tab">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10l2 4H5l2-4zm-2 6h14l-1 10H6L5 10zm4 2v6h2v-6h-2zm4 0v6h2v-6h-2z"/></svg>
          <span class="admin-tab-label">Buyurtmalar</span>
        </a>
      </nav>

      <div class="admin-header-search admin-header-search-spacer" aria-hidden="true"></div>

      <div class="admin-header-actions">
        <a href="/admin" class="btn-ghost">Mahsulotlar ro'yxati</a>
        <button type="button" id="logoutBtn" class="btn-ghost btn-logout">Chiqish</button>
      </div>
    </header>

    <main class="admin-main">
      <div id="productEditorRoot" class="product-editor-page"></div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>window.__ADMIN_PAGE = 'product';</script>
  <script src="/config.js"></script>
  <script src="/api.js"></script>
  <script src="/admin-nav.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
